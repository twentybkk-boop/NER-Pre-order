<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NER แจ่วฮ้อน - Modern Reservation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root {
            --primary-bg: #0c1811;
            --card-bg: #14241b;
            --card-border: #233d2e;
            --accent-gold: #c59b27;
            --accent-red: #d9381e;
            --text-white: #f5f5f0;
            --text-dim: #a5b5ab;
            --input-bg: #09130e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--primary-bg); 
            color: var(--text-white); 
            font-family: 'Prompt', sans-serif; 
            margin: 0; padding-bottom: 120px;
            line-height: 1.5;
        }

        h1, h2, h3, .brand-font { font-family: 'Playfair Display', serif; }

        .premium-header {
            background: linear-gradient(180deg, #1b3325 0%, var(--primary-bg) 100%);
            padding: 45px 20px 30px;
            text-align: center;
            border-bottom: 1px solid rgba(197, 155, 39, 0.3);
        }
        .premium-header h1 { font-size: 2.8rem; margin: 0; letter-spacing: 3px; line-height: 1; font-weight: 700; }
        .premium-header h1 span { color: var(--accent-gold); }
        .premium-header p { font-size: 0.8rem; color: var(--accent-gold); margin-top: 8px; letter-spacing: 2px; font-weight: 500; }

        .info-pills { display: flex; justify-content: center; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
        .pill { 
            background: rgba(197, 155, 39, 0.1); 
            border: 1px solid var(--accent-gold); 
            color: var(--accent-gold);
            padding: 6px 14px; border-radius: 50px; font-size: 11px; text-decoration: none;
            display: flex; align-items: center; gap: 6px; transition: 0.3s;
        }

        .container { max-width: 600px; margin: 0 auto; padding: 15px; }

        .section-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 22px;
            margin-bottom: 20px;
            border: 1px solid var(--card-border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        .card-header { 
            display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
            border-bottom: 1px solid rgba(197, 155, 39, 0.15); padding-bottom: 12px;
        }
        .card-header i { color: var(--accent-gold); font-size: 1.3rem; }
        .card-header span { font-weight: 600; font-size: 17px; color: var(--accent-gold); letter-spacing: 0.5px; }

        .alert-box {
            background: rgba(197, 155, 39, 0.07);
            border: 1px dashed var(--accent-gold);
            padding: 14px; border-radius: 15px; margin-bottom: 18px; font-size: 12px;
            line-height: 1.6;
        }

        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 12px; color: var(--accent-gold); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        label span { font-size: 10px; color: var(--text-dim); font-weight: normal; margin-left: 4px; }
        
        input, select {
            width: 100%; background: var(--input-bg); border: 1px solid var(--card-border);
            padding: 14px 16px; border-radius: 14px; color: #fff; font-size: 15px; outline: none; transition: 0.3s;
        }
        input:focus, select:focus { border-color: var(--accent-gold); background: #0e1a14; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .time-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

        .category-title { 
            font-size: 1.2rem; color: var(--accent-gold); margin: 35px 0 18px;
            display: flex; align-items: center; gap: 12px; font-weight: 700;
        }
        .category-title::after { content: ""; flex: 1; height: 1px; background: rgba(197, 155, 39, 0.2); }

        .menu-item {
            background: var(--card-bg); border-radius: 20px; padding: 16px; margin-bottom: 14px;
            display: flex; gap: 16px; align-items: center; border: 1px solid var(--card-border); transition: 0.3s;
        }
        .menu-item.selected { border-color: var(--accent-gold); background: #1b3325; }

        .img-box {
            width: 85px; height: 85px; background: var(--input-bg); border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 9px; color: #405d4b; text-align: center; flex-shrink: 0;
            border: 1px solid var(--card-border);
            line-height: 1.2;
        }

        .menu-details { flex: 1; }
        .menu-name { font-weight: 600; font-size: 15px; color: #fff; display: block; line-height: 1.3; }
        .menu-en { font-size: 11px; color: var(--text-dim); line-height: 1.2; display: block; margin-top: 4px; }
        .menu-price { color: var(--accent-gold); font-weight: 700; margin-top: 6px; display: block; font-size: 14px; }

        .qty-controls { display: flex; align-items: center; background: var(--input-bg); border-radius: 12px; overflow: hidden; border: 1px solid var(--card-border); }
        .btn-q { width: 34px; height: 34px; border: none; background: transparent; color: #fff; font-weight: bold; cursor: pointer; font-size: 18px; }
        .btn-q:active { background: var(--accent-gold); color: #000; }
        .qty-val { width: 32px; text-align: center; font-size: 15px; font-weight: 700; color: #fff; }

        .note-input {
            width: 100%; background: #070d09; border: 1px solid #1a2f23; border-radius: 10px;
            padding: 10px 14px; color: #e5a93b; font-size: 12px; margin-top: 12px; display: none; outline: none;
        }

        .bottom-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(12, 24, 17, 0.95); backdrop-filter: blur(20px);
            padding: 20px 25px; border-top: 1px solid rgba(197, 155, 39, 0.25);
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .total-info h4 { margin: 0; font-size: 11px; color: var(--text-dim); font-weight: 400; text-transform: uppercase; letter-spacing: 0.5px; }
        .total-info p { margin: 0; font-size: 24px; font-weight: 800; color: var(--accent-gold); line-height: 1; }

        .btn-order {
            background: linear-gradient(135deg, var(--accent-gold) 0%, #a07d1a 100%);
            color: #0c1811; border: none; padding: 14px 28px; border-radius: 14px;
            font-weight: 700; font-size: 15px; box-shadow: 0 8px 20px rgba(197,155,39,0.35);
            cursor: pointer; font-family: 'Prompt', sans-serif;
        }
    </style>
</head>
<body>

    <header class="premium-header">

        <p>PREMIUM ISAN SOUL</p>
        <div class="info-pills">

            <div class="card-header"><i class="fa-solid fa-calendar-check"></i> <span>RESERVATION | ข้อมูลการจอง</span></div>
            
            <div class="alert-box" id="holidayBox">
                <i class="fa-solid fa-calendar-day" style="color:var(--accent-gold); margin-right:5px;"></i>

            <div class="alert-box" style="background: rgba(217, 56, 30, 0.05); border-color: var(--accent-red);">

            <div class="input-group">
                <label>ชื่อผู้จอง <span>/ Customer Name</span></label>
                <input type="text" id="name" placeholder="ระบุชื่อของคุณ">
            </div>

            <div class="grid-2">
                <div class="input-group">
                    <label>เบอร์โทรศัพท์ <span>/ Phone</span></label>
                    <input type="tel" id="phone" placeholder="08x-xxx-xxxx">
                </div>
                <div class="input-group">
                    <label>จำนวนท่าน <span>/ Guests</span></label>
                    <select id="guests">
                        <option value="1">1 ท่าน / 1 Person</option>
                        <option value="2" selected>2 ท่าน / 2 People</option>
                        <option value="3">3 ท่าน / 3 People</option>
                        <option value="4">4 ท่าน / 4 People</option>
                        <option value="5">5 ท่าน / 5 People</option>
                        <option value="6">6 ท่าน / 6 People</option>
                        <option value="7+">7 ท่านขึ้นไป / 7+ People</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label>วันที่ทาน <span>/ Date</span></label>
                <input type="date" id="date">
            </div>

            <div class="input-group">
                <label>เวลาที่เข้าทาน <span>/ Arrival Time</span></label>
                <div class="time-row">
                    <select id="hour"></select>
                    <select id="minute"></select>
                    <select id="ampm">
                        <option value="AM">AM</option>
                        <option value="PM" selected>PM</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="menuContainer"></div>
    </div>

    <div class="bottom-bar">
        <div class="total-info">

        </div>

                    { id: 'mj3', name: "โมจิไอศครีม - มัทฉะ", en: "Mochi Ice Cream - Matcha", price: 39 }
                ]
            },
            {

                    { id: 'dr2', name: "น้ำโค้ก Zero", en: "Coke Zero", price: 25 },

                    { id: 'dr4', name: "สิงห์เลมอนโซดา", en: "Singha Lemon Soda", price: 25 },
                    { id: 'dr5', name: "น้ำแข็งถัง (รีฟิล)", en: "Ice Bucket (Refill)", price: 25 }
                ]
            }
        ];

        const orderMap = {};

        function init() {
            renderMenu();
            initTimeSelectors();
            calculateHolidays();
            liff.init({ liffId: LIFF_ID }).catch(err => console.error(err));
            document.getElementById('date').valueAsDate = new Date();
        }

        function calculateHolidays() {
            const startDay = new Date(2026, 6, 20); // 20 July 2026
            const today = new Date();
            let holidays = [];
            let check = new Date(startDay);
            for(let i=0; i<10; i++) {
                if (check >= today) {
                    holidays.push(check.toLocaleDateString('th-TH', { day:'2-digit', month:'2-digit' }));
                }
                check.setDate(check.getDate() + 14);
                if (holidays.length >= 4) break;
            }
            document.getElementById('holidayNotice').innerText = "ร้านหยุดจันทร์ที่: " + holidays.join(', ');
        }

        function initTimeSelectors() {
            const h = document.getElementById('hour');
            const m = document.getElementById('minute');
            for(let i=1; i<=12; i++) h.options.add(new Option(i.toString().padStart(2,'0'), i));
            for(let i=0; i<60; i++) m.options.add(new Option(i.toString().padStart(2,'0'), i));
            h.value = 5;
        }

        function renderMenu() {
            let html = "";
            menuData.forEach(category => {
                html += `<div class="category-title">${category.cat}</div>`;
                category.items.forEach(item => {
                    html += `
                        <div class="menu-item" id="card-${item.id}">
                            <div class="img-box">Image<br>coming soon</div>
                            <div class="menu-details">
                                <span class="menu-name">${item.name}</span>
                                <span class="menu-en">${item.en}</span>
                                <span class="menu-price">${item.price} ฿</span>
                                <input type="text" class="note-input" id="note-${item.id}" placeholder="ระบุหมายเหตุ เช่น ไม่ใส่พริก...">
                            </div>
                            <div class="qty-controls">
                                <button class="btn-q" onclick="updateQty('${item.id}', -1, ${item.price})">-</button>
                                <span class="qty-val" id="qty-${item.id}">0</span>
                                <button class="btn-q" onclick="updateQty('${item.id}', 1, ${item.price})">+</button>
                            </div>
                        </div>
                    `;
                });
            });
            document.getElementById('menuContainer').innerHTML = html;
        }

        function updateQty(id, delta, price) {
            const current = orderMap[id] ? orderMap[id].qty : 0;
            const newVal = Math.max(0, current + delta);
            const card = document.getElementById(`card-${id}`);
            const note = document.getElementById(`note-${id}`);
            
            if (newVal > 0) {
                const itemData = menuData.flatMap(c => c.items).find(i => i.id === id);
                orderMap[id] = { qty: newVal, price: price, name: itemData.name };
                card.classList.add('selected');
                note.style.display = 'block';
            } else {
                delete orderMap[id];
                card.classList.remove('selected');
                note.style.display = 'none';
            }
            document.getElementById(`qty-${id}`).innerText = newVal;
            calculateTotal();
        }

        function calculateTotal() {
            let total = 0;
            for (let key in orderMap) total += (orderMap[key].qty * orderMap[key].price);
            document.getElementById('totalPrice').innerText = total.toLocaleString();
        }

        function submitOrderDirectly() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const time = `${document.getElementById('hour').value}:${document.getElementById('minute').value.padStart(2,'0')} ${document.getElementById('ampm').value}`;
            
            if(!name || !phone) return alert("กรุณาระบุชื่อและเบอร์โทรศัพท์");
            if(Object.keys(orderMap).length === 0) return alert("กรุณาเลือกรายการอาหารอย่างน้อย 1 อย่าง");

            let itemText = "";
            for (let id in orderMap) {
                const noteVal = document.getElementById(`note-${id}`).value;
                itemText += `• ${orderMap[id].name} x${orderMap[id].qty} [${(orderMap[id].qty * orderMap[id].price).toLocaleString()}.-]\n`;
                if(noteVal) itemText += `  └ Note: ${noteVal}\n`;
            }

            const finalMsg = `🔥 ออเดอร์ร้าน NER แจ่วฮ้อน\n------------------\n👤 คุณ: ${name}\n📞: ${phone}\n📅: ${document.getElementById('date').value}\n⏰: ${time}\n------------------\n📋 รายการอาหาร:\n${itemText}\n💰 รวม: ${document.getElementById('totalPrice').innerText} บาท\n------------------\n*ไม่รับจองหลัง 18.00 น.\n*มาเลทเกิน 15 นาทีขออนุญาตปล่อยโต๊ะ`;

            if (liff.isInClient()) {
                liff.sendMessages([{ type: 'text', text: finalMsg }]).then(() => {
                    liff.closeWindow();
                }).catch(err => {
                    alert("เกิดข้อผิดพลาดในการส่งข้อความ: " + err);
                });
            } else {
                alert("กรุณาส่งออเดอร์ผ่านแอปพลิเคชัน LINE ครับ");
                window.location.href = "https://lin.ee/Oy7FTKX";
            }
        }

        init();
    </script>
</body>
</html>
